---
name: lemp

services:
  www:
    container_name: www
    image: nginx:1.28
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost/health
      interval: 10s
      timeout: 1s
      retries: 2
      #start_period: 20s
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx-conf:/etc/nginx/conf.d
    networks:
      stagenet:
        ipv4_address: 172.25.0.100
    depends_on:
      php:
        condition: service_healthy

  php:
    container_name: php
    image: php-mysql:8.4-fpm
    build:
      context: .
    restart: unless-stopped
    healthcheck:
      test: SCRIPT_FILENAME=/var/www/html/ping.php REQUEST_METHOD=GET cgi-fcgi -bind -connect localhost:9000 | grep 'pong' || exit 1
      interval: 20s
      retries: 2
      timeout: 1s
    volumes:
      - ./html:/var/www/html
    networks:
      stagenet:
        ipv4_address: 172.25.0.110
      phpdbnet:
        ipv4_address: 172.26.0.110

networks:
  stagenet:
    ipam:
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.254
      options:
        com.docker.network.bridge.name: stagenet0

  phpdbnet:
    ipam:
      config:
        - subnet: 172.26.0.0/16
          gateway: 172.26.0.254
      options:
        com.docker.network.bridge.name: phpdbnet0
