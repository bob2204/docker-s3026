services:
  who-1:
    image: bob2606/hello-http:0.8.41
    container_name: who-1
    hostname: who-1
    restart: unless-stopped
    networks:
      whonet:
        ipv4_address: 172.28.0.101
    labels:
      traefik.enable: true
      traefik.http.services.who-1.loadbalancer.server.port: 8080
      traefik.http.routers.who-1.rule: Host(`who-1.stage.local`)
      traefik.http.middlewares.authwho-1.digestauth.usersfile: /etc/traefik/users.txt
      traefik.http.middlewares.authwho-1.digestauth.realm: whonet
      traefik.http.routers.who-1.middlewares: authwho-1

  who-2:
    image: bob2606/hello-http:0.8.41
    container_name: who-2
    hostname: who-2
    restart: unless-stopped
    networks:
      whonet:
        ipv4_address: 172.28.0.102
    labels:
      traefik.enable: true
      traefik.http.services.who-2.loadbalancer.server.port: 8080
      traefik.http.routers.who-2.rule: PathPrefix(`/who-2`)
      traefik.http.middlewares.stripwho-2.stripprefix.prefixes: /who-2
      traefik.http.routers.who-2.middlewares: stripwho-2

  who-3:
    image: bob2606/hello-http:0.8.41
    container_name: who-3
    hostname: who-3
    restart: unless-stopped
    networks:
      whonet:
        ipv4_address: 172.28.0.103
    labels:
      traefik.enable: true
      traefik.http.services.who-3.loadbalancer.server.port: 8080
      traefik.http.routers.who-3.rule: (Host(`who-3.stage.local`) && PathPrefix(`/who-3`))
      traefik.http.middlewares.stripwho-3.stripprefix.prefixes: /who-3
      traefik.http.routers.who-3.middlewares: stripwho-3

networks:
  whonet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
